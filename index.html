	<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function() {
    var closeBtn = document.getElementById('close-page-btn');
    if (closeBtn) {
        closeBtn.addEventListener('click', function(e) {
            e.preventDefault(); 
            
            // 针对不同浏览器内核的联合强关命令
            window.location.href = "about:blank"; // 先把页面刷成空白，绕过部分浏览器拦截

            window.open('', '_self', '');
            window.close();
            
            // 【核心退路】如果以上命令全部被浏览器死死拦截，0.05秒后执行以下动作：
            setTimeout(function(){
                // 方案 A：如果是在微信/QQ内置浏览器中，调用微信官方API直接关闭
                if (navigator.userAgent.indexOf("MicroMessenger") > -1) {
                    WeixinJSBridge.call('closeWindow');
                } else {
                    // 方案 B：普通浏览器直接跳回首页，并提示用户
                    alert('您的浏览器已拦截自动关闭动作，系统将为您返回首页。');

            }, 50);

});
